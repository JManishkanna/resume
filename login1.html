<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="2.css">
    <title>Login | Manish</title>
</head>

<body>
    <header>
        <a href="index.html" class="logo" style="font-family:verdana;">Manish</a>
        <nav>
            <a href="1.html">Home</a>
            <a href="resume.html">resume</a>
            <a href="project.html">Projects</a>
            <a href="contact.html">Contact</a>
            <a href="login1.html" class="active">Login</a>
        </nav>
    </header>

    <section class="login-section">
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Log in to continue with your portfolio dashboard.</p>
            </div>
            <form class="login-form" action="#" method="post">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn login-btn">Login</button>
                <p class="login-note">Don’t have an account? <a href="index.html">Go back home</a></p>
            </form>
        </div>
    </section>

</body>

</html>
